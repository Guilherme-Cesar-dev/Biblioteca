<!DOCTYPE html>
<html lang="en">
<head>

    <title>Library</title>
    <link rel="stylesheet" href="/front/css/style_library.css">

    <section id="center">

    <!--Parte Central-->
        <main>
            <div id="books">
                <!--Produtos Fixos-->
                <div class="book">
                    <img src="" alt="">

                </div>

                <div class="book">
                    <img src="" alt="">

                </div>

                <div class="book">
                    <img src="" alt="">

                </div>

                <div class="book">
                    <img src="" alt="">
                    <p class="p-book">P4</p>
                </div>

                <div class="book">
                    <img src="" alt="">
                    <p class="p-book">P5</p>
                </div>

                <div class="book">
                    <img src="" alt="">
                    <p class="p-book">P6</p>
                </div>

            </div>
        </main>
    </section>

<!--Parte Inferior-->
    <footer>
        <div class="down">
            <p class="text">BLA BLA</p>
            <p class="text">BLA BLA</p>
            <p class="text">BLA BLA</p>
        </div>

</html>
