<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library</title>
    <link rel="stylesheet" href="/front/css/style_library.css">
</head>
<body>

<!--Parte Superior-->
    <nav>
        <div id="top">
            <div class="perfil">
                <div class="perfil-left">
                    <button class="perfil-button"><a class="link-a" href="index.html"><</a></button>
                    <img class="perfil-img-logo" src="/front/img/bookmark.png" alt="LOGO">
                </div>
                <div class="perfil-right">
                    <img class="perfil-img" src="/gifs/lendo.gif" alt="PHOTO">
                    <p class="perfil-p">Perfil</p>
                </div>
            </div>
        </div>
    </nav>

    <section id="center">
<!--Parte Lateral-->    
        <aside>
            <div id="beside">
                <div>
                    <button class="button-beside-a" type="button">A1</button>
                    <button class="button-beside-b" type="button">A2</button>
                    <button class="button-beside-a" type="button">A3</button>
                    <!--<input class="input-beside" type="file" multiple accept=".pdf"></input>-->   
                    <button class="button-beside-b" id="addBook" type="button" onclick="addBook()">Add Book</button>   
                </div>
                <div id="input-file" >
                    <div class="input-files">
                        <input class="file" type="file" name="file-input" accept=".pdf">
                        <button class="button-file" id="closee">X</button>
                    </div>
                </div>
            </div>
        </aside>
    <!--Parte Central-->
        <main>
            <div id="books">
                <!--Produtos Fixos-->
                <div class="book">
                    <img class="book-img" src="/front/img/o_hobbit.jpg" alt="O hobbit">
                    <p class="p-book">O hobbit</p>
                </div>

                <div class="book">
                    <img class="book-img" src="/front/img/as_cronicas_de_narnia.jpg" alt="">
                    <p class="p-book">As Crônicas de Narnia</p>
                </div>

                <div class="book">
                    <img class="book-img" src="/front/img/as_barbas_do_imperador.jpg" alt="">
                    <p class="p-book">As Barbas do Imperador</p>
                </div>

                <div class="book">
                    <img class="book-img" src="/front/img/capitaes_da_areia.jpg" alt="">
                    <p class="p-book">Capitães da Areia</p>
                </div>

                <div class="book">
                    <img class="book-img" src="/front/img/frankenstein.jpg" alt="">
                    <p class="p-book">Frankenstein</p>
                </div>

                <div class="book">
                    <img class="book-img" src="/front/img/pinoquio.jpg" alt="">
                    <p class="p-book">Pinóquio</p>
                </div>

            </div>
        </main>
    </section>

<!--Parte Inferior-->
    <footer>
        <div id="down">
            <div class="box-down">
                <h3 class="h3-down">Sobre</h3>
                <p class="text-down">NADA AINDA</p>
            </div>
            <div class="box-down">
                <h3 class="h3-down">Redes Sociais</h3>
                <p class="text-down">SO BESTEIRA</p>
            </div>
            <div class="box-down">
                <h3 class="h3-down">Livros</h3>
                <p class="text-down">como funciona um livro?</p>
            </div>
        </div>
        <p class="mensage-down">Copyright (c) 2026 Cesar</p>
    </footer>

    <script src="/front/js/script.js"></script>
</body>
</html>
